<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #253044;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #eab308;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding: 16px;
    }

    h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
    h2 { font-size: 1rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header-right { display: flex; gap: 8px; }

    /* Summary Cards */
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .card-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .card-value.income { color: var(--green); }
    .card-value.expense { color: var(--red); }
    .card-value.balance { color: var(--text); }
    .card-value.balance.negative { color: var(--red); }

    /* Month filter */
    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 12px;
    }

    .month-nav span { font-weight: 600; min-width: 110px; text-align: center; }

    /* Form */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }

    .add-section h2 { margin-bottom: 12px; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-grid .full { grid-column: 1 / -1; }

    label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 4px; }

    input, select, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 48px; font-family: inherit; }

    .type-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .type-toggle button {
      flex: 1;
      padding: 8px;
      background: var(--bg);
      color: var(--text-muted);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.15s;
    }

    .type-toggle button.active-income { background: #166534; color: var(--green); }
    .type-toggle button.active-expense { background: #7f1d1d; color: var(--red); }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 14px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-primary { background: var(--blue); color: #fff; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--red); border: none; padding: 4px 8px; font-size: 0.8rem; }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
    .btn-icon { background: transparent; color: var(--text-muted); padding: 4px 8px; font-size: 1rem; }

    /* Transactions list */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .transactions { display: flex; flex-direction: column; gap: 8px; }

    .tx-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s;
    }

    .tx-item:hover { border-color: #475569; }

    .tx-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tx-dot.income { background: var(--green); }
    .tx-dot.expense { background: var(--red); }

    .tx-info { flex: 1; min-width: 0; }
    .tx-desc { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    .tx-amount {
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .tx-amount.income { color: var(--green); }
    .tx-amount.expense { color: var(--red); }

    .tx-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* Category badges */
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Chart */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }

    .chart-section h2 { margin-bottom: 14px; }

    .bar-chart { display: flex; flex-direction: column; gap: 8px; }

    .bar-row { display: flex; align-items: center; gap: 10px; }
    .bar-label { width: 90px; font-size: 0.8rem; color: var(--text-muted); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 16px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .bar-val { font-size: 0.8rem; width: 70px; text-align: right; }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px;
      font-size: 0.9rem;
    }

    /* Export row */
    .export-row { display: flex; gap: 8px; }

    /* Scrollable tx list */
    .tx-scroll { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .tx-scroll::-webkit-scrollbar { width: 4px; }
    .tx-scroll::-webkit-scrollbar-track { background: transparent; }
    .tx-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Responsive */
    @media (max-width: 520px) {
      .summary { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      .bar-label { width: 70px; }
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1e293b;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      transition: transform 0.25s;
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>💰 Finance Tracker</h1>
  <div class="header-right">
    <button class="btn-ghost btn-sm" onclick="exportCSV()">Export CSV</button>
    <button class="btn-danger btn-sm" onclick="clearAll()">Clear All</button>
  </div>
</div>

<!-- Summary -->
<div class="summary">
  <div class="card">
    <div class="card-label">Balance</div>
    <div class="card-value balance" id="balance">$0.00</div>
  </div>
  <div class="card">
    <div class="card-label">Income</div>
    <div class="card-value income" id="total-income">$0.00</div>
  </div>
  <div class="card">
    <div class="card-label">Expenses</div>
    <div class="card-value expense" id="total-expense">$0.00</div>
  </div>
</div>

<!-- Month Nav -->
<div class="controls">
  <div class="month-nav">
    <button class="btn-icon" onclick="changeMonth(-1)">&#8249;</button>
    <span id="month-label"></span>
    <button class="btn-icon" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <button class="btn-ghost btn-sm" onclick="goToday()">This Month</button>
</div>

<!-- Add Transaction -->
<div class="add-section">
  <h2>Add Transaction</h2>
  <div class="form-grid">
    <div class="full">
      <div class="type-toggle">
        <button id="btn-expense" class="active-expense" onclick="setType('expense')">— Expense</button>
        <button id="btn-income" onclick="setType('income')">+ Income</button>
      </div>
    </div>

    <div>
      <label>Description *</label>
      <input type="text" id="f-desc" placeholder="e.g. Groceries" maxlength="60" />
    </div>

    <div>
      <label>Amount *</label>
      <input type="number" id="f-amount" placeholder="0.00" min="0.01" step="0.01" />
    </div>

    <div>
      <label>Category</label>
      <select id="f-cat">
        <option value="">— Select —</option>
        <optgroup label="Expenses">
          <option>Food</option>
          <option>Transport</option>
          <option>Housing</option>
          <option>Health</option>
          <option>Entertainment</option>
          <option>Clothing</option>
          <option>Education</option>
          <option>Family</option>
          <option>Remittance</option>
          <option>Savings</option>
          <option>Other</option>
        </optgroup>
        <optgroup label="Income">
          <option>Salary</option>
          <option>Allotment</option>
          <option>Bonus</option>
          <option>Investment</option>
          <option>Freelance</option>
          <option>Other Income</option>
        </optgroup>
      </select>
    </div>

    <div>
      <label>Date</label>
      <input type="date" id="f-date" />
    </div>

    <div class="full">
      <label>Note (optional)</label>
      <textarea id="f-note" placeholder="Any extra details..."></textarea>
    </div>

    <div class="full">
      <button class="btn-primary" style="width:100%" onclick="addTransaction()">Add Transaction</button>
    </div>
  </div>
</div>

<!-- Category Chart -->
<div class="chart-section" id="chart-section">
  <h2>Spending by Category</h2>
  <div class="bar-chart" id="bar-chart"></div>
</div>

<!-- Transaction List -->
<div>
  <div class="section-header">
    <h2 id="list-heading">Transactions</h2>
    <span id="tx-count" style="font-size:0.8rem;color:var(--text-muted)"></span>
  </div>
  <div class="tx-scroll" id="tx-list"></div>
</div>

<div id="toast"></div>

<script>
  const STORAGE_KEY = 'ft_transactions_v1';
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const CURRENCY = '$';

  let transactions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let currentType = 'expense';
  let viewYear, viewMonth;

  // Init date
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  // Set default date input to today
  document.getElementById('f-date').valueAsDate = now;

  function fmt(n) {
    return CURRENCY + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function setType(t) {
    currentType = t;
    document.getElementById('btn-income').className = t === 'income' ? 'active-income' : '';
    document.getElementById('btn-expense').className = t === 'expense' ? 'active-expense' : '';
  }

  function changeMonth(dir) {
    viewMonth += dir;
    if (viewMonth > 11) { viewMonth = 0; viewYear++; }
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    render();
  }

  function goToday() {
    const n = new Date();
    viewYear = n.getFullYear();
    viewMonth = n.getMonth();
    render();
  }

  function addTransaction() {
    const desc = document.getElementById('f-desc').value.trim();
    const amt  = parseFloat(document.getElementById('f-amount').value);
    const cat  = document.getElementById('f-cat').value;
    const date = document.getElementById('f-date').value;
    const note = document.getElementById('f-note').value.trim();

    if (!desc) return toast('Please enter a description.');
    if (!amt || amt <= 0) return toast('Please enter a valid amount.');
    if (!date) return toast('Please select a date.');

    transactions.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      type: currentType,
      desc,
      amount: parseFloat(amt.toFixed(2)),
      category: cat || 'Other',
      date,
      note,
      created: Date.now()
    });

    save();
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('f-note').value = '';
    render();
    toast('Transaction added!');
  }

  function deleteTransaction(id) {
    transactions = transactions.filter(t => t.id !== id);
    save();
    render();
    toast('Deleted.');
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(transactions));
  }

  function getFiltered() {
    return transactions.filter(t => {
      const d = new Date(t.date + 'T00:00:00');
      return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    }).sort((a, b) => b.date.localeCompare(a.date) || b.created - a.created);
  }

  function render() {
    const filtered = getFiltered();

    // Month label
    document.getElementById('month-label').textContent = MONTHS[viewMonth] + ' ' + viewYear;

    // Totals
    let income = 0, expense = 0;
    filtered.forEach(t => {
      if (t.type === 'income') income += t.amount;
      else expense += t.amount;
    });

    const bal = income - expense;
    const balEl = document.getElementById('balance');
    balEl.textContent = (bal < 0 ? '-' : '') + fmt(bal);
    balEl.className = 'card-value balance' + (bal < 0 ? ' negative' : '');

    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);

    // List heading
    document.getElementById('list-heading').textContent =
      MONTHS[viewMonth] + ' Transactions';
    document.getElementById('tx-count').textContent =
      filtered.length ? filtered.length + ' item' + (filtered.length > 1 ? 's' : '') : '';

    // Render transactions
    const listEl = document.getElementById('tx-list');
    if (!filtered.length) {
      listEl.innerHTML = '<div class="empty">No transactions for this month.<br>Add one above!</div>';
    } else {
      listEl.innerHTML = filtered.map(t => `
        <div class="tx-item">
          <div class="tx-dot ${t.type}"></div>
          <div class="tx-info">
            <div class="tx-desc" title="${esc(t.desc)}">${esc(t.desc)}</div>
            <div class="tx-meta">
              <span class="badge">${esc(t.category)}</span>
              &nbsp;${t.date}
              ${t.note ? ' &middot; ' + esc(t.note) : ''}
            </div>
          </div>
          <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</div>
          <div class="tx-actions">
            <button class="btn-danger" onclick="deleteTransaction('${t.id}')" title="Delete">✕</button>
          </div>
        </div>
      `).join('');
    }

    // Category chart (expenses only)
    renderChart(filtered.filter(t => t.type === 'expense'));
  }

  function renderChart(expenses) {
    const catMap = {};
    expenses.forEach(t => {
      catMap[t.category] = (catMap[t.category] || 0) + t.amount;
    });

    const entries = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
    const max = entries[0]?.[1] || 1;
    const chart = document.getElementById('bar-chart');

    const COLORS = {
      Food:'#f97316', Transport:'#06b6d4', Housing:'#8b5cf6',
      Health:'#ec4899', Entertainment:'#eab308', Clothing:'#a78bfa',
      Education:'#22d3ee', Family:'#f43f5e', Remittance:'#34d399',
      Savings:'#60a5fa', Other:'#94a3b8'
    };

    if (!entries.length) {
      chart.innerHTML = '<div class="empty" style="padding:16px">No expense data this month.</div>';
      return;
    }

    chart.innerHTML = entries.map(([cat, val]) => `
      <div class="bar-row">
        <div class="bar-label" title="${esc(cat)}">${esc(cat)}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:${COLORS[cat]||'#64748b'}"></div>
        </div>
        <div class="bar-val" style="color:var(--red)">${fmt(val)}</div>
      </div>
    `).join('');
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  function exportCSV() {
    if (!transactions.length) return toast('No transactions to export.');
    const rows = [['Date','Type','Description','Category','Amount','Note']];
    transactions
      .sort((a,b) => a.date.localeCompare(b.date))
      .forEach(t => rows.push([
        t.date, t.type, t.desc, t.category,
        (t.type === 'expense' ? -t.amount : t.amount),
        t.note || ''
      ]));
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'finance-tracker.csv';
    a.click();
    toast('CSV exported!');
  }

  function clearAll() {
    if (!confirm('Delete ALL transactions? This cannot be undone.')) return;
    transactions = [];
    save();
    render();
    toast('All transactions cleared.');
  }

  render();
</script>
</body>
</html>
